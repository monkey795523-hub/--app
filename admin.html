<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>家人监控 - 心情日记</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-header h1 {
            color: white;
            font-size: 18px;
            margin: 0;
            flex: 1;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }
        .user-list {
            padding: 16px;
        }
        .user-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .user-card:active { transform: scale(0.98); }
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .user-info { flex: 1; }
        .user-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }
        .user-stats {
            font-size: 12px;
            color: #999;
        }
        .user-score {
            font-size: 22px;
            font-weight: 700;
            color: #667eea;
        }
        /* 详情面板 */
        .detail-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            flex-direction: column;
        }
        .detail-panel.show { display: flex; }
        .detail-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .detail-header h2 { color: white; font-size: 18px; margin: 0; flex: 1; }
        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .record-item {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .record-date {
            font-size: 13px;
            color: #999;
            margin-bottom: 6px;
        }
        .record-scores {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .score-badge {
            background: white;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 12px;
            color: #555;
        }
        .score-badge span {
            font-weight: 700;
            color: #667eea;
        }
        .record-emotions {
            margin-top: 8px;
            font-size: 12px;
            color: #777;
        }
        .loading-tip {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div style="background:#f5f5f5;min-height:100vh;">
        <div class="admin-header">
            <button class="back-btn" onclick="location.href='index.html'">← 返回</button>
            <h1>👨‍👩‍👧 家人监控</h1>
        </div>

        <div class="user-list" id="userList">
            <div class="loading-tip">加载中...</div>
        </div>
    </div>

    <!-- 详情面板 -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <button class="back-btn" onclick="closeDetail()">← 返回</button>
            <h2 id="detailName">详情</h2>
        </div>
        <div class="detail-content" id="detailContent">
            <div class="loading-tip">加载中...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        let currentAdmin = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            currentAdmin = user;

            // 检查是否管理员
            const profileDoc = await db.collection('userList').doc(user.uid).get();
            if (!profileDoc.exists || !profileDoc.data().isAdmin) {
                document.getElementById('userList').innerHTML = '<div class="loading-tip">⚠️ 无权限访问此页面</div>';
                return;
            }

            loadUsers();
        });

        async function loadUsers() {
            const snap = await db.collection('userList').orderBy('createdAt').get();
            const listEl = document.getElementById('userList');
            listEl.innerHTML = '';

            if (snap.empty) {
                listEl.innerHTML = '<div class="loading-tip">暂无家人数据</div>';
                return;
            }

            for (const doc of snap.docs) {
                const data = doc.data();
                const uid = doc.id;

                // 获取记录数和最近评分
                let recordCount = 0;
                let avgScore = '--';
                try {
                    const recSnap = await db.collection('users').doc(uid).collection('records').get();
                    recordCount = recSnap.size;
                    if (recordCount > 0) {
                        let total = 0;
                        recSnap.forEach(r => { total += calcScore(r.data()); });
                        avgScore = (total / recordCount).toFixed(1);
                    }
                } catch(e) {}

                const card = document.createElement('div');
                card.className = 'user-card';
                card.onclick = () => openDetail(uid, data.displayName);
                card.innerHTML = `
                    <div class="user-avatar">${data.displayName ? data.displayName[0] : '?'}</div>
                    <div class="user-info">
                        <div class="user-name">${data.displayName || data.email}${data.isAdmin ? ' 👑' : ''}</div>
                        <div class="user-stats">记录 ${recordCount} 天</div>
                    </div>
                    <div class="user-score">${avgScore}</div>
                `;
                listEl.appendChild(card);
            }
        }

        async function openDetail(uid, name) {
            document.getElementById('detailName').textContent = name + ' 的记录';
            document.getElementById('detailContent').innerHTML = '<div class="loading-tip">加载中...</div>';
            document.getElementById('detailPanel').classList.add('show');

            try {
                const snap = await db.collection('users').doc(uid).collection('records')
                    .orderBy('date', 'desc').limit(30).get();

                const content = document.getElementById('detailContent');
                if (snap.empty) {
                    content.innerHTML = '<div class="loading-tip">暂无记录</div>';
                    return;
                }

                content.innerHTML = '';
                snap.forEach(doc => {
                    const r = doc.data();
                    const score = calcScore(r).toFixed(1);
                    const emotions = (r.emotions || []).join(' · ') || '未填写';
                    const item = document.createElement('div');
                    item.className = 'record-item';
                    item.innerHTML = `
                        <div class="record-date">${r.date || doc.id}</div>
                        <div class="record-scores">
                            <div class="score-badge">综合 <span>${score}</span></div>
                            <div class="score-badge">心情 <span>${r.mood ?? '--'}</span></div>
                            <div class="score-badge">精力 <span>${r.energy ?? '--'}</span></div>
                            <div class="score-badge">睡眠 <span>${r.sleep?.duration ?? '--'}h</span></div>
                        </div>
                        <div class="record-emotions">情绪：${emotions}</div>
                        ${r.highlight ? `<div class="record-emotions" style="margin-top:4px;color:#555;">亮点：${r.highlight}</div>` : ''}
                    `;
                    content.appendChild(item);
                });
            } catch(e) {
                document.getElementById('detailContent').innerHTML = `<div class="loading-tip">加载失败：${e.message}</div>`;
            }
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('show');
        }

        function calcScore(record) {
            const mood = record.mood !== undefined ? record.mood : 5;
            const energy = record.energy !== undefined ? record.energy : 5;
            const diffScore = record.sleep?.difficulty !== undefined ? [10, 6, 2][record.sleep.difficulty] : 7;
            const duration = record.sleep?.duration ?? 7;
            const durScore = duration === 0 ? 0 : Math.max(0, Math.min(10, 10 - Math.abs(duration - 7.5) * 1.2));
            const sleepScore = (diffScore + durScore) / 2;
            const d = record.desires;
            const desireAvg = d ? ((d.appetite ?? 0) + (d.motivation ?? 0) + (d.social ?? 0) + (d.physical ?? 0)) / 4 : 5;
            const symptomPenalty = (record.symptoms?.length || 0) * 0.5;
            const score = (mood + energy + sleepScore + desireAvg) / 4 - symptomPenalty;
            return Math.max(0, Math.min(10, score));
        }
    </script>
</body>
</html>
