<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>心情日记 - 登录</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-logo .logo-emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }
        .login-logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin: 0;
        }
        .login-logo p {
            font-size: 13px;
            color: #999;
            margin: 4px 0 0;
        }
        .tab-switch {
            display: flex;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 24px;
        }
        .tab-switch button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-switch button.active {
            background: white;
            color: #667eea;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary:active { opacity: 0.85; }
        .error-msg {
            color: #e53935;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            min-height: 18px;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.7);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-emoji">🌙</span>
                <h1>心情日记</h1>
                <p>记录每一天的状态</p>
            </div>

            <div class="tab-switch">
                <button class="active" id="tabLogin" onclick="switchTab('login')">登录</button>
                <button id="tabRegister" onclick="switchTab('register')">注册</button>
            </div>

            <!-- 登录表单 -->
            <div id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn-primary" onclick="doLogin()">登录</button>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" style="display:none">
                <div class="form-group">
                    <label>昵称（显示用）</label>
                    <input type="text" id="regName" placeholder="如：妈妈、小明">
                </div>
                <div class="form-group">
                    <label>用户名（登录用，字母数字）</label>
                    <input type="text" id="regUsername" placeholder="4-20位字母数字">
                </div>
                <div class="form-group">
                    <label>密码（至少8位含字母和数字）</label>
                    <input type="password" id="regPassword" placeholder="请设置密码">
                </div>
                <button class="btn-primary" onclick="doRegister()">注册并登录</button>
            </div>

            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <script src="cloudbase-config.js"></script>
    <script>
        // 如果已登录直接跳转
        (async () => {
            const loginState = await tcbAuth.getLoginState();
            if (loginState) window.location.href = 'index.html';
        })();

        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('errorMsg').textContent = '';
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('show', show);
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
        }

        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { showError('请填写用户名和密码'); return; }
            showLoading(true);
            try {
                await tcbAuth.signInWithUsername(username, password);
                window.location.href = 'index.html';
            } catch(e) {
                showLoading(false);
                const msg = e.message || '';
                if (msg.includes('not found') || msg.includes('invalid')) showError('用户名或密码错误');
                else showError('登录失败：' + msg);
            }
        }

        async function doRegister() {
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!name) { showError('请填写昵称'); return; }
            if (!username || username.length < 4) { showError('用户名至少4位'); return; }
            if (password.length < 8) { showError('密码至少8位，含字母和数字'); return; }
            showLoading(true);
            try {
               const state = await tcbAuth.signUp({ username, password });
let uid = state?.user?.uid;
if (!uid) { const ls = await tcbAuth.getLoginState(); uid = ls?.user?.uid; }
if (!uid) { showLoading(false); showError('注册成功，请直接登录'); switchTab('login'); document.getElementById('loginUsername').value = username; return; }
                // 判断是否第一个用户（成为管理员）
                let isAdmin = false;
                try {
                    const existing = await tcbDb.collection('userList').limit(1).get();
                    isAdmin = !existing.data || existing.data.length === 0;
                } catch(e) { isAdmin = false; }
                // 保存用户信息
                await tcbDb.collection('userList').doc(uid).set({
                    displayName: name,
                    username: username,
                    isAdmin: isAdmin,
                    createdAt: Date.now()
                });
                window.location.href = 'index.html';
            } catch(e) {
                showLoading(false);
                const msg = e.message || '';
                if (msg.includes('already exists') || msg.includes('username')) showError('该用户名已被注册');
                else if (msg.includes('password')) showError('密码需8-32位，包含字母和数字');
                else showError('注册失败：' + msg);
            }
        }

        // 回车键提交
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const loginVisible = document.getElementById('loginForm').style.display !== 'none';
                if (loginVisible) doLogin(); else doRegister();
            }
        });
    </script>
</body>
</html>
