<!-- stats.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>数据统计</title>
   <link rel="stylesheet" href="style.css">
<style>
    .tab-icon-img {
        width: 50px;
        height: 50px;
        object-fit: contain;
    }
</style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>📊 数据趋势</h1>
        </header>
        
        <main class="content stats-content">
            <div class="chart-selector">
                <button class="chart-btn active" data-chart="mood">心情</button>
                <button class="chart-btn" data-chart="energy">精力</button>
                <button class="chart-btn" data-chart="sleep">睡眠</button>
                <button class="chart-btn" data-chart="weight">体重</button>
            </div>
            
            <div class="time-range">
                <button class="range-btn active" data-days="7">7 天</button>
                <button class="range-btn" data-days="30">30 天</button>
                <button class="range-btn" data-days="90">90 天</button>
            </div>
            
            <div class="chart-container">
                <div class="chart-scroll" id="chartScroll">
                    <canvas id="waveChart"></canvas>
                </div>
            </div>
            
            <div class="stats-summary">
                <div class="summary-item">
                    <span class="summary-label">平均值</span>
                    <span class="summary-value" id="avgValue">--</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">最高值</span>
                    <span class="summary-value" id="maxValue">--</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">最低值</span>
                    <span class="summary-value" id="minValue">--</span>
                </div>
            </div>
        </main>
        
        <nav class="tab-bar">
    <div class="tab-item" onclick="location.href='index.html'">
        <img src="images/home.png" alt="首页" class="tab-icon-img">
        <span class="tab-label">首页</span>
    </div>
    <div class="tab-item" onclick="location.href='calendar.html'">
        <img src="images/calendar.png" alt="日历" class="tab-icon-img">
        <span class="tab-label">日历</span>
    </div>
    <div class="tab-item" onclick="location.href='record.html'">
        <img src="images/record.png" alt="记录" class="tab-icon-img">
        <span class="tab-label">记录</span>
    </div>
    <div class="tab-item active" onclick="location.href='stats.html'">
        <img src="images/stats.png" alt="统计" class="tab-icon-img">
        <span class="tab-label">统计</span>
    </div>
</nav>
    </div>
    
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <script src="cloudbase-config.js"></script>
    <script src="app.js"></script>
    <script src="chart.js"></script>
</body>
</html>
